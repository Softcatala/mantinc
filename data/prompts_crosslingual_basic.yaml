  persona: usuari_final
  workflow: ai_misconception_explanation
  source_lang: es-ca
  target_lang: ca
  forbidden_terms:
  - mucha gente
  - sustituye
  - capacidades humanas
  - automatiza la creatividad
  - supervisión humana
  prompt: 'Explica en català un malentès comú sobre el tema descrit i corregeix-lo
    amb un exemple concret.


    Font (castellà): "Mucha gente cree que la IA sustituye por completo las capacidades
    humanas y automatiza la creatividad, cuando en realidad se limita a ampliar tareas
    concretas bajo supervisión humana."'
